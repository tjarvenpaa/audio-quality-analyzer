# Docker Compose with GPU Support + Web Interface

services:
  # Ollama LLM Service with GPU
  ollama:
    image: ollama/ollama:latest
    container_name: audio-quality-ollama-gpu
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - audio-ai-network

  # Audio Quality Analyzer with GPU
  audio-analyzer:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: audio-quality-analyzer-gpu
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./input_folder:/app/input_folder
      - ./output:/app/output
      - ./config.yaml:/app/config.yaml
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - audio-ai-network
    # Uncomment to run analysis automatically on startup:
    # command: python3 watch.py
  
  # Web Interface
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: audio-quality-web
    restart: unless-stopped
    depends_on:
      - audio-analyzer
      - ollama
    ports:
      - "5000:5000"
    volumes:
      - ./web:/app/web
      - ./src:/app/src
      - ./input_folder:/app/input_folder
      - ./output:/app/output
      - ./config.yaml:/app/config.yaml
      # Docker socket for docker exec access
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - OLLAMA_URL=http://ollama:11434
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    networks:
      - audio-ai-network

volumes:
  ollama_data:
    driver: local

networks:
  audio-ai-network:
    driver: bridge
